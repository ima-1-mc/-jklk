name: Chocolatine

env:
  MIRROR_SSH_URL: git@github.com:ima-1-mc/-jklk.git
  EXECUTABLES: my_sudo
  CC: epiclang

on:
  push:
    branches-ignore:
      - "no-ga/**"
  pull_request:
    branches-ignore:
      - "no-ga/**"

jobs:
  check_if_mirror_repo:
    name: Check if correspond to the ssh url
    steps:
      name: only check
      run: |
        MIRROR=$(echo "$MIRROR_SSH_URL" | sed 's|.*\:(.*\)\.git|\1|')
        if [ "$MIRROR" = "$GITHUB_REPOSITORY" ]; then
            echo "Running inside the mirror"
            exit 1
        fi
        echo "Proceeding"

  check_compilation_and_coding_style:
    name: Check compilation and coding style
    needs: check_if_mirror_repo
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    if: ${{ github.repository != vars.MIRROR_REPO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run banana-check-repo
        run: banana-check-repo

      - name: Compile with make
        timeout-minutes: 2
        env:
          CC: epiclang
        run: make

      - name: Display coding style errors as annotations
        run: |
          if [ -f coding-style-reports.log ]; then
            while IFS= read -r line; do
              file=$(echo "$line" | cut -d':' -f1)
              lineno=$(echo "$line" | cut -d':' -f2)
              severity=$(echo "$line" | cut -d':' -f3 | tr -d ' ')
              code=$(echo "$line" | cut -d':' -f4 | tr -d ' ')
              echo "::error file=${file},line=${lineno}::${severity} coding style error: ${file}#L${lineno} - ${code}"
            done < coding-style-reports.log
          fi

      - name: Fail if coding style errors found
        run: |
          if [ -f coding-style-reports.log ] && [ -s coding-style-reports.log ]; then
            echo "Coding style errors found, failing."
            exit 1
          fi

      - name: Clean build artifacts
        run: make clean

      - name: Verify executables exist and are executable
        run: |
          FAILED=0
          IFS=',' read -ra EXECS <<< "$EXECUTABLES"
          for exec in "${EXECS[@]}"; do
            exec=$(echo "$exec" | tr -d ' ')
            if [ ! -f "$exec" ]; then
              echo "::error file=${exec},line=0::Missing executable: ${exec}"
              FAILED=1
            elif [ ! -x "$exec" ]; then
              echo "::error file=${exec},line=0::Not executable: ${exec}"
              FAILED=1
            fi
          done
          exit $FAILED
        shell: bash

  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests
        timeout-minutes: 2
        run: make tests_run

  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: ${{ github.event_name == 'push' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Epitech repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
